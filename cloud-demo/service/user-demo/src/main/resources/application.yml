spring:
  profiles:
    active: dev
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${config.ip.mysql}:${config.port.mysql}/cloud-test?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${config.mysql.username}
    password: ${config.mysql.password}
  application:
    name: user-demo # 服务名
  cloud:
    nacos:
      server-addr: ${config.ip.nacos}:${config.port.nacos} # Nacos地址
    openfeign:
      okhttp:
        enabled: true # 使用okhttp作为Feign客户端
  data:
    redis:
      host: ${config.ip.redis}
      port: ${config.port.redis}
      database: 0 # Redis数据库索引（默认为0）
      timeout: 10000 # 连接超时时间（毫秒）
      lettuce:
        pool:
          max-active: 8 # 连接池最大连接数（使用负值表示没有限制）
          max-wait: -1ms # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-idle: 8 # 连接池中的最大空闲连接
          min-idle: 0 # 连接池中的最小空闲连接
    # MongoDB配置
    mongodb:
      uri: mongodb://${config.mongodb.username}:${config.mongodb.password}@${config.ip.mongodb}:${config.port.mongodb}/${config.mongodb.database}?authSource=${config.mongodb.database}
  rabbitmq: # RabbitMQ配置
    host: ${config.ip.rabbitmq}
    port: ${config.port.rabbitmq}
    username: ${config.rabbitmq.username}
    password: ${config.rabbitmq.password}
    virtual-host: /
    listener:
      simple:
        prefetch: 1 # 预取消息数量
        acknowledge-mode: auto # 确认模式（自动确认）
        retry:
          max-attempts: 3 # 最大重试次数
          enabled: true # 开启重试功能
        default-requeue-rejected: false  # 关键：重试失败后不将消息放回原队列（避免循环）

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml  # 自定义XML文件路径
  # 开启驼峰命名自动映射（数据库字段下划线转Java驼峰命名）
  configuration:
    map-underscore-to-camel-case: true

# 指定端口号为8082，服务名为user-demo
server:
  port: 8082
  servlet:
    context-path: /user-demo